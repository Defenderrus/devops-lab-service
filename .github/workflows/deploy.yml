name: CI/CD Pipeline

on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t devops-lab-service .

      - name: Test container
        run: |
          docker run -d -p 8000:8000 --name test-app devops-lab-service
          sleep 5
          curl --fail http://localhost:8000 || exit 1
          curl --fail http://localhost:8000/metrics || exit 1
          curl -X POST --fail http://localhost:8000/tasks || exit 1
          docker stop test-app && docker rm test-app

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_HOST }}
          port: 2222
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/devops-lab-service
            git pull origin master
            docker-compose -f docker/docker-compose.yml down
            docker-compose -f docker/docker-compose.yml up -d --build
            docker image prune -f
